<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Home</title>

  <!-- ✅ FIXED CSS LINK -->
  <link rel="stylesheet" href="styles.css">
</head>

<body>

  <header>
    <h2>MyCompany</h2>

    <!-- ✅ HAMBURGER -->
    <div class="menu-toggle" id="menuToggle">☰</div>

    <!-- ✅ FIXED NAV -->
    <nav id="navMenu">
      <a href="index.html">Home</a>
      <a href="about.html">About</a>
      <a href="services.html">Services</a>
      <a href="contact.html">Contact</a>
    </nav>

    <!-- ✅ TOGGLE -->
    <button id="darkToggle" class="toggle-btn">🌙</button>
  </header>

  <!-- HERO -->
  <section class="hero reveal">
    <div>
      <h1>We Build Modern Solutions</h1>
      <p>Helping businesses grow with technology.</p>
      <button>Get Started</button>
    </div>

    <!-- ✅ FIXED IMAGE -->
    <img src="https://via.placeholder.com/400" alt="hero">
  </section>

  <!-- SERVICES -->
  <section class="section reveal">
    <h2>Our Services</h2>
    <div class="card-container">
      <div class="card reveal">Web Development</div>
      <div class="card reveal">Mobile Apps</div>
      <div class="card reveal">Cloud Solutions</div>
    </div>
  </section>

  <footer>
    <p>© 2026 MyCompany</p>
  </footer>

  <script>
    /* DARK MODE */
    document.getElementById("darkToggle").onclick = () => {
      document.body.classList.toggle("dark");
    };

    /* MOBILE MENU */
    document.getElementById("menuToggle").onclick = () => {
      document.getElementById("navMenu").classList.toggle("active");
    };

    /* SCROLL REVEAL */
    function reveal() {
      document.querySelectorAll(".reveal").forEach(el => {
        if (el.getBoundingClientRect().top < window.innerHeight - 100) {
          el.classList.add("active");
        }
      });
    }
    window.addEventListener("scroll", reveal);
    reveal();
  </script>

</body>

</html>
