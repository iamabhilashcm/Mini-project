<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact</title>

  <link rel="stylesheet" href="C:\TICL-Project\css\styles.css">
</head>

<body>

  <!-- OVERLAY -->
  <div class="overlay" id="overlay"></div>

  <!-- HEADER -->
  <header>

    <a href="index.html" class="logo">My<span>Co.</span></a>

    <!-- HAMBURGER -->
    <button class="hamburger" id="hamburger" aria-label="Menu">
      <span></span><span></span><span></span>
    </button>

    <!-- NAV -->
    <nav id="nav">
      <a href="C:\TICL-Project\index.html">Home</a>
      <a href="C:\TICL-Project\pages\about.html">About</a>
      <a href="C:\TICL-Project\pages\services.html">Services</a>
      <a href="C:\TICL-Project\pages\contact.html" class="active">Contact</a>
    </nav>

    <!-- DARK MODE -->
    <button id="darkToggle" class="icon-btn">🌙</button>

  </header>

  <!-- CONTACT SECTION -->
  <section class="section reveal">
    <div class="section-label">Get in touch</div>
    <h1 class="section-title">Contact Us</h1>
    <p class="section-sub">
      Have a project in mind? Send us a message and we’ll get back within 24 hours.
    </p>

    <form class="reveal">
      <div class="form-group">
        <label>Name</label>
        <input type="text" placeholder="Your name">
      </div>

      <div class="form-group">
        <label>Email</label>
        <input type="email" placeholder="you@example.com">
      </div>

      <div class="form-group">
        <label>Message</label>
        <textarea rows="5" placeholder="Write your message..."></textarea>
      </div>

      <button class="btn-primary" type="submit">Send Message →</button>
    </form>
  </section>

  <!-- FOOTER -->
  <footer>
    <div class="footer-inner">
      <a href="index.html" class="logo">My<span>Co.</span></a>

      <div class="footer-links">
        <a href="#">Privacy</a>
        <a href="#">Terms</a>
        <a href="#">Careers</a>
      </div>

      <p class="footer-copy">© 2026 MyCompany</p>
    </div>
  </footer>

  <!-- SCRIPTS -->
  <script src="C:\TICL-Project\jsScripts\darkMode.js"></script>
  <script src="C:\TICL-Project\jsScripts\search.js"></script>
</body>

</html>
